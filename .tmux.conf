# .tmux.conf - Custom configuration for tmux

# --- Core Configuration ---
# --------------------------

# Set prefix key to C-x (Ctrl-X)
set -g prefix C-x
# Send the prefix to the nested session when the prefix key is pressed twice.
bind C-x send-prefix

# Set mouse support on
# Allows clicking on windows, panes, and resizing panes with the mouse.
set -g mouse on

# Set scroll mode to mouse
# Allows scrolling through the history of a pane using the mouse wheel (requires mouse support to be on).
# This binding uses standard commands, not special symbols.
bind -n WheelUpPane if-shell -F '#{?mouse_any_flag,1,0}' 'send-keys -M' 'if -K then send-keys -X copy-mode-vi; send-keys -M'

# Set clipboard to system clipboard for copy paste
# NOTE: The 'xclip' command here is for Linux. On macOS, this will require 'reattach-to-user-namespace'
# or using 'pbcopy' (if not using reattach). You may need to adjust this depending on the server OS.
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -i -selection clipboard"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -i -selection clipboard"

# --- Visual/Style Enhancements (Standard Characters Only) ---
# -----------------------------------------------------------

# Set beautiful readable borders and panes
# Set the default terminal to 256 colors
set -g default-terminal "screen-256color"
# Force a refresh of the client terminal's capability database
set-option -ga terminal-features ",xterm-256color:allow-rename"

# Set border color (default)
set -g pane-border-style fg=colour240
# Set border color (active pane)
set -g pane-active-border-style fg=colour51

set -g pane-border-status top 
set -g pane-border-format "[#(whoami)]"

# Set status line style
set -g status-style fg=white,bg=colour234

# Left status configuration: session name and window list.
# REPLACED Powerline symbol () with standard pipe (|)
set -g status-left '#[fg=colour16,bg=colour240]#S#[fg=colour16,bg=colour240]'

# Right status configuration: date, time, and hostname.
# REPLACED Powerline symbols () with standard pipe (|)
set -g status-right '%H:%M:%S %d-%b-%y '

# Window status line style (for inactive windows)
# set -g window-status-style fg=colour240,bg=colour234
# Active window status line style (pane status)
set -g window-status-current-style fg=colour51,bg=colour234,bold

# Window status format
# REPLACED Powerline symbols () with standard spaces/pipes
set -g window-status-format ' #I:#W'
# Active window status format
set -g window-status-current-format ' #I:#W'

# Enable activity alerts
setw -g monitor-activity on
set -g visual-activity on

# --- Extras - Best Used in Workflow ---
# (Keybindings remain the same, as they don't affect character display)
# --------------------------------------


# Split pane using | and - (vertical and horizontal split, respectively)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload the tmux configuration file with prefix + r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded!"

# Resize panes with prefix + H/J/K/L (repeatable with -r)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Easier toggling of synchronized-panes
bind S setw synchronize-panes

# Open new window in the same path
bind c new-window -c "#{pane_current_path}"


# -----------------------------------------------------------------------------
# --- KEYBINDINGS USAGE FOR REGULAR WORKFLOWS ---
# -----------------------------------------------------------------------------
# This section details the most useful key combinations for daily use, based on
# the custom prefix (C-x) and the extra bindings in this file.

# CORE PREFIX
# The new prefix is C-x (Control + X). Press it once, release, then press the command key.

# 0. Session Management
#   - start (tmux) detach (C-x d) AND REATTACH (tmux attach)
# 1. PANE MANAGEMENT (THE GRID)
#   - Vertical Split (Left/Right): C-x |
#   - Horizontal Split (Top/Bottom): C-x -
#   - Switch Panes (Fastest way): C-x + Arrow Keys
#   - Resize Panes: C-x H/J/K/L

# 2. WINDOW MANAGEMENT (THE TABS)
#   - New Window: C-x c
#   - Next/Previous Window: C-x n / C-x p
#   - Go to a specific Window: C-x 0 (or 1, 2, 3, etc.)

# 3. COPY/PASTE AND HISTORY
#   - Enter Copy Mode: C-x [
#   - Copy & Exit (System Clipboard): y (while in Copy Mode)

# 4. MAINTENANCE & SYNCHRONIZATION
#   - Reload Config: C-x r
#   - Toggle Sync: C-x S
